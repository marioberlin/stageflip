# .github/workflows/cv-worker.yml
# T-244-cv-worker — Python service CI. Runs the pytest suite (PaddleOCR
# stubbed via monkeypatch) plus a Docker build smoke test. Independent from
# the TS-only ci.yml job graph; triggered only when the service or its
# deploy script changes.
#
# Security note: this workflow does not interpolate any user-controlled
# event payload (issue titles, PR bodies, etc.) into run: blocks.

name: cv-worker

on:
  push:
    branches: [main]
    paths:
      - "services/cv-worker/**"
      - "scripts/deploy-cv-worker.sh"
      - ".github/workflows/cv-worker.yml"
  pull_request:
    paths:
      - "services/cv-worker/**"
      - "scripts/deploy-cv-worker.sh"
      - ".github/workflows/cv-worker.yml"

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: services/cv-worker/requirements-dev.txt

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libgomp1 shellcheck

      - name: Install Python deps (pytest set, no PaddlePaddle)
        # We avoid installing PaddlePaddle in CI -- it is ~700 MB and the test
        # suite stubs it via monkeypatch. Install only the lightweight deps
        # the tests actually exercise.
        run: |
          pip install --upgrade pip
          pip install \
            opencv-python-headless==4.10.0.84 \
            numpy==1.26.4 \
            pillow==10.4.0 \
            fastapi==0.115.0 \
            'uvicorn[standard]==0.30.6' \
            python-multipart==0.0.10 \
            pytest==8.3.3 \
            httpx==0.27.2

      - name: Run pytest
        working-directory: services/cv-worker
        run: pytest -ra

  shellcheck:
    name: shellcheck deploy script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
      - run: shellcheck scripts/deploy-cv-worker.sh

  docker-build:
    name: docker build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: services/cv-worker
          push: false
          load: true
          tags: cv-worker:ci
      - name: Image size check (< 4 GB)
        run: |
          SIZE_BYTES=$(docker image inspect cv-worker:ci --format='{{.Size}}')
          MAX_BYTES=$((4 * 1024 * 1024 * 1024))
          echo "image size: ${SIZE_BYTES} bytes (limit ${MAX_BYTES})"
          if [ "${SIZE_BYTES}" -gt "${MAX_BYTES}" ]; then
            echo "::error::cv-worker image exceeds 4 GB budget"
            exit 1
          fi
      - name: Smoke test (healthz)
        run: |
          docker run -d --name cv-worker-test -p 8080:8080 cv-worker:ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz; then
              echo
              echo "healthz OK after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::healthz did not become ready within 30s"
          docker logs cv-worker-test
          exit 1
      - name: Cleanup
        if: always()
        run: docker rm -f cv-worker-test || true
