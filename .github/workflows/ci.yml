# .github/workflows/ci.yml
# Main CI for StageFlip. Runs every hard quality gate from docs/implementation-plan.md §A.6
# that exists today. Gates added by later tasks (check-determinism -> T-028, check-skill-drift
# -> T-014, size-limit -> T-049, parity -> Phase 5) append to this file as those tasks land.
#
# Security note: the only ${{ }} interpolations used are github.ref (in concurrency) and
# env.NODE_VERSION (set by this workflow). No untrusted event payloads are inlined into run:
# blocks, per GitHub's workflow-injection guidance.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  verify:
    name: typecheck · lint · test · gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm (from packageManager field)
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        # --frozen-lockfile also serves as the lockfile-drift check; install
        # fails if package.json + pnpm-lock.yaml disagree.
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (unit, via turbo)
        run: pnpm test

      - name: Gate - licenses
        run: pnpm check-licenses

      - name: Gate - Remotion import ban
        run: pnpm check-remotion-imports

      - name: Gate - skill drift
        run: pnpm check-skill-drift

      - name: Gate - skills-sync (auto-gen freshness)
        run: pnpm skills-sync:check

      - name: Gate - determinism (scoped to clip/runtime code)
        run: pnpm check-determinism

      - name: Gate - bundle-size budget (size-limit)
        run: pnpm size-limit

  parity:
    name: parity (fixture scoring)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Path-filtered via dorny/paths-filter: skip unless a
    # rendering-adjacent file changed. We run in CI because parsing +
    # CLI correctness are cheap structural checks regardless of
    # whether goldens are committed yet. Once goldens land (future
    # task), this becomes a true behavioural gate. The
    # skip-isn't-failure posture from T-101 means the current output
    # is "all-skipped, exit 0" — which still catches fixture-manifest
    # drift and CLI regressions.
    steps:
      - uses: actions/checkout@v4

      - name: Detect rendering-adjacent changes
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rendering:
              - 'packages/parity/**'
              - 'packages/parity-cli/**'
              - 'packages/renderer-cdp/**'
              - 'packages/cdp-host-bundle/**'
              - 'packages/frame-runtime/**'
              - 'packages/rir/**'
              - 'packages/schema/**'
              - 'packages/fonts/**'
              - 'packages/runtimes/**'
              - 'packages/testing/**'
              - '.github/workflows/ci.yml'

      - name: Setup pnpm
        if: steps.changed.outputs.rendering == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        if: steps.changed.outputs.rendering == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        if: steps.changed.outputs.rendering == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run parity harness (structural + scoring when goldens present)
        if: steps.changed.outputs.rendering == 'true'
        # `pnpm parity` exits 0 when every scored fixture passes and
        # skipped fixtures don't count as failure. That means this
        # job is always green while goldens are still being primed —
        # but any CLI regression, fixture-schema drift, or threshold-
        # resolution bug trips it immediately.
        run: pnpm parity --fixtures-dir packages/testing/fixtures

      - name: Skip reason
        if: steps.changed.outputs.rendering != 'true'
        run: echo "Skipped — no rendering-adjacent files changed in this PR."

  e2e:
    name: e2e (Playwright smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Resolve Playwright version for cache key
        id: pw
        run: |
          VERSION=$(pnpm exec playwright --version | awk '{print $2}')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Chromium for Playwright (when cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run Playwright smoke tests
        run: pnpm e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  render-e2e:
    name: render-e2e (reference-render against real Chrome + ffmpeg)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Path-filtered the same way as `parity`: only runs when a
    # rendering-adjacent file changed. On ubuntu-latest Google Chrome
    # is pre-installed at /usr/bin/google-chrome (matches the first
    # Linux candidate in reference-render.ts::findChrome). We add
    # ffmpeg via apt, point PUPPETEER_EXECUTABLE_PATH at the system
    # Chrome for belt-and-suspenders, and run ONLY the e2e file
    # (unit suites already ran in `verify`). On success the 3 MP4s
    # are uploaded as a build artifact so operators can inspect the
    # real render output without re-running the job locally —
    # resolves handover-phase5 §6.2 (no CI infra for Chrome + ffmpeg).
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect rendering-adjacent changes
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rendering:
              - 'packages/parity/**'
              - 'packages/parity-cli/**'
              - 'packages/renderer-cdp/**'
              - 'packages/cdp-host-bundle/**'
              - 'packages/frame-runtime/**'
              - 'packages/rir/**'
              - 'packages/schema/**'
              - 'packages/fonts/**'
              - 'packages/runtimes/**'
              - 'packages/testing/**'
              - '.github/workflows/ci.yml'

      - name: Setup pnpm
        if: steps.changed.outputs.rendering == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        if: steps.changed.outputs.rendering == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install ffmpeg + ffprobe
        if: steps.changed.outputs.rendering == 'true'
        # ubuntu-latest ships Chrome at /usr/bin/google-chrome already;
        # only ffmpeg (which also provides ffprobe) is missing.
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1
          /usr/bin/google-chrome --version

      - name: Install dependencies (frozen lockfile)
        if: steps.changed.outputs.rendering == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build workspace (vitest resolves workspace deps via their dist/)
        if: steps.changed.outputs.rendering == 'true'
        # The e2e file imports renderer-cdp/src/dispatch.ts which imports
        # @stageflip/runtimes-contract — a sibling workspace package whose
        # package.json "exports" point at dist/*.js. When vitest runs
        # outside turbo (as we do here to target a single file) those
        # dist/ outputs don't exist yet, so vite's resolver fails with
        # "Failed to resolve entry for package @stageflip/runtimes-contract".
        # Building up-front is the minimal fix; turbo caches so repeat
        # runs are cheap.
        run: pnpm build

      - name: Run reference-render e2e (real Chrome + real ffmpeg + real ffprobe)
        if: steps.changed.outputs.rendering == 'true'
        # STAGEFLIP_E2E_ARTIFACT_DIR tells the test to emit MP4s into a
        # stable path and skip the tmpdir cleanup, so the upload step
        # below can pick them up.
        #
        # We deliberately do NOT set PUPPETEER_EXECUTABLE_PATH — findChrome()
        # in reference-render.ts already probes /usr/bin/google-chrome as
        # its first Linux candidate, and letting it do its own detection
        # means a future runner image flipping to Chromium at a different
        # path would auto-adapt instead of hard-failing on a stale hard-code.
        env:
          STAGEFLIP_E2E_ARTIFACT_DIR: ${{ runner.temp }}/render-e2e-artifacts
          # Force screenshot capture on CI. Auto-mode on Linux appends
          # `--enable-begin-frame-control` to Chrome's launch args;
          # when the BeginFrame probe then falls back to screenshot,
          # Chrome is left in a compositor-waiting state that
          # `page.screenshot()` never satisfies — tests 2 + 3 hang at
          # 120s. Forcing 'screenshot' skips the launch args AND the
          # probe, taking the same code path macOS/Windows default to.
          STAGEFLIP_E2E_CAPTURE_MODE: screenshot
        run: |
          set -euo pipefail
          mkdir -p "$STAGEFLIP_E2E_ARTIFACT_DIR"
          pnpm --filter @stageflip/renderer-cdp exec vitest run src/reference-render.e2e.test.ts

      - name: Upload rendered MP4 artifacts
        if: steps.changed.outputs.rendering == 'true' && (success() || failure())
        uses: actions/upload-artifact@v4
        with:
          name: render-e2e-mp4s
          path: ${{ runner.temp }}/render-e2e-artifacts/
          retention-days: 7
          if-no-files-found: warn

      # T-119c: goldens-priming audit + real-render attempt.
      #
      # The dry-run step is a hard gate — it exercises the full
      # `stageflip-parity prime` subcommand plumbing (arg parsing,
      # REFERENCE_FIXTURES resolver, default-frames, CLI output) on
      # real CI-built code. If it regresses, fix before merge.
      #
      # The real-render step is behind `continue-on-error: true`
      # because T-119b surfaced a known cross-package issue: the
      # cdp-host-bundle IIFE doesn't reach `window.__sf.ready` when
      # loaded in real Chrome (the unit suites use happy-dom; the
      # canvas-placeholder e2e uses a trivial HTML host, neither
      # exercises the real bundle boot). Once that's fixed, this
      # step goes green and the `parity-goldens-reference-<sha>`
      # artifact starts shipping the 9 PNGs (3 fixtures × 3 frames)
      # operators need to inspect before committing goldens.
      - name: Prime reference-set goldens (dry-run audit)
        if: steps.changed.outputs.rendering == 'true'
        env:
          PRIME_OUT_DIR: ${{ runner.temp }}/parity-goldens-reference
        run: |
          set -euo pipefail
          mkdir -p "$PRIME_OUT_DIR"
          pnpm parity:prime --reference-fixtures --out "$PRIME_OUT_DIR" --dry-run

      - name: Prime reference-set goldens (real render, best-effort)
        if: steps.changed.outputs.rendering == 'true'
        id: prime-real
        continue-on-error: true
        env:
          PRIME_OUT_DIR: ${{ runner.temp }}/parity-goldens-reference
        run: |
          set -euo pipefail
          rm -rf "$PRIME_OUT_DIR"
          mkdir -p "$PRIME_OUT_DIR"
          pnpm parity:prime --reference-fixtures --out "$PRIME_OUT_DIR"

      - name: Upload reference-set goldens (when real render produced files)
        if: steps.changed.outputs.rendering == 'true' && steps.prime-real.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: parity-goldens-reference-${{ github.sha }}
          path: ${{ runner.temp }}/parity-goldens-reference/
          retention-days: 7
          if-no-files-found: error

      - name: Skip reason
        if: steps.changed.outputs.rendering != 'true'
        run: echo "Skipped — no rendering-adjacent files changed in this PR."

  changesets:
    name: changeset present (on PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Assert changeset present if any publishable package changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          # Any packages/* change EXCEPT @stageflip/testing (path: packages/testing).
          pkg_changed=$(printf '%s\n' "$changed" | grep -E '^packages/' | grep -v '^packages/testing/' || true)
          new_changeset=$(printf '%s\n' "$changed" | grep -E '^\.changeset/[a-z0-9-]+\.md$' || true)
          if [ -n "$pkg_changed" ] && [ -z "$new_changeset" ]; then
            echo "::error::Publishable package changed but no new changeset was added."
            echo "Files that triggered this:"
            printf '  %s\n' $pkg_changed
            echo "Run: pnpm changeset"
            exit 1
          fi
          echo "changeset check passed"
