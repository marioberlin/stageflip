# .github/workflows/ci.yml
# Main CI for StageFlip. Runs every hard quality gate from docs/implementation-plan.md §A.6
# that exists today. Gates added by later tasks (check-determinism -> T-028, check-skill-drift
# -> T-014, size-limit budgets, parity -> Phase 5) append to this file as those tasks land.
#
# Security note: the only ${{ }} interpolations used are github.ref (in concurrency) and
# env.NODE_VERSION (set by this workflow). No untrusted event payloads are inlined into run:
# blocks, per GitHub's workflow-injection guidance.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  verify:
    name: typecheck · lint · test · gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm (from packageManager field)
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (unit, via turbo)
        run: pnpm test

      - name: Gate - licenses
        run: pnpm check-licenses

      - name: Gate - Remotion import ban
        run: pnpm check-remotion-imports

      - name: Gate - skill drift
        run: pnpm check-skill-drift

  e2e:
    name: e2e (Playwright smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: pnpm e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
