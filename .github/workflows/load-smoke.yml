# .github/workflows/load-smoke.yml
# T-269 -- K6 load-test smoke workflow. Two layers, both <= 10 min total.
#
# 1. Archive (every PR + push): `k6 archive` parses each scenario without
#    running it. Fails on syntax / import / threshold-config errors. Cheap
#    (~ seconds) and runs on every change to tests/load/**.
#
# 2. Live smoke (push to main only, gated on STAGING_LOAD_URL secret):
#    runs the three scenarios at smoke parameters (10 VUs x 60 s) against
#    a real staging tenant. Threshold breach fails the job; tight runner
#    variance is absorbed by the 50 % headroom in thresholds.js.
#
#    The live job is conditional because the staging tenant URL + bootstrap
#    auth are env-specific; without them every HTTP call would fail and the
#    threshold gate would be useless. When the secret is unset the job is
#    skipped (NOT failed), matching the dorny/paths-filter posture in ci.yml.
#
# Security note: only github.ref (concurrency) + github.sha (artifact name)
# are interpolated into run: blocks. No untrusted event payloads.

name: load-smoke

on:
  push:
    branches: [main]
    paths:
      - "tests/load/**"
      - ".github/workflows/load-smoke.yml"
  pull_request:
    paths:
      - "tests/load/**"
      - ".github/workflows/load-smoke.yml"

concurrency:
  group: load-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  archive:
    name: K6 archive (syntax + import check)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup K6 (grafana/setup-k6-action)
        # AC #6 -- pinned action per task spec.
        uses: grafana/setup-k6-action@v1

      - name: Verify K6 install
        run: k6 version

      - name: Archive scenarios
        # `k6 archive` parses + bundles a scenario without executing. It is
        # the cheapest gate that proves all imports resolve and the
        # `options.thresholds` shape is valid. Fails fast on typos before
        # any network or VU work.
        run: |
          set -euo pipefail
          mkdir -p tests/load/runs
          for scenario in collab-sync render-submit api-mixed; do
            k6 archive \
              --archive-out "tests/load/runs/${scenario}.tar" \
              "tests/load/scenarios/${scenario}.js"
          done

      - name: Upload archives
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: load-smoke-archives-${{ github.sha }}
          path: tests/load/runs/*.tar
          retention-days: 7
          if-no-files-found: warn

  live-smoke:
    name: K6 live smoke (against staging)
    runs-on: ubuntu-latest
    needs: archive
    # Only on push to main, only when staging URL is configured.
    # The conditional uses the env-context check pattern (vars on schedule):
    # if STAGING_LOAD_URL is not set as a repo secret, the job is SKIPPED,
    # not failed. AC #6's "fails on threshold breach" applies when this job
    # runs; when skipped, the upstream `archive` gate is sufficient.
    if: github.event_name == 'push' && vars.STAGING_LOAD_URL != ''
    timeout-minutes: 10
    env:
      STAGEFLIP_LOAD_PROFILE: smoke
      STAGEFLIP_LOAD_TARGET: ${{ vars.STAGING_LOAD_URL }}
      STAGEFLIP_LOAD_AUTH_TOKEN: ${{ secrets.STAGING_LOAD_AUTH_TOKEN }}
      STAGEFLIP_LOAD_ORG_ID: ${{ vars.STAGING_LOAD_ORG_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup K6 (grafana/setup-k6-action)
        uses: grafana/setup-k6-action@v1

      - name: Run api-mixed scenario (smoke)
        run: |
          set -euo pipefail
          mkdir -p tests/load/runs
          k6 run \
            --summary-export tests/load/runs/api-mixed.summary.json \
            --out json=tests/load/runs/api-mixed.json \
            tests/load/scenarios/api-mixed.js

      - name: Run render-submit scenario (smoke)
        run: |
          set -euo pipefail
          k6 run \
            --summary-export tests/load/runs/render-submit.summary.json \
            --out json=tests/load/runs/render-submit.json \
            tests/load/scenarios/render-submit.js

      - name: Run collab-sync scenario (smoke)
        run: |
          set -euo pipefail
          k6 run \
            --summary-export tests/load/runs/collab-sync.summary.json \
            --out json=tests/load/runs/collab-sync.json \
            tests/load/scenarios/collab-sync.js

      - name: Upload K6 summaries
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: load-smoke-summaries-${{ github.sha }}
          path: tests/load/runs/
          retention-days: 7
          if-no-files-found: warn
