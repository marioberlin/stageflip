# .github/workflows/release.yml
# T-227 — Changesets-driven release workflow. Opens a "Version Packages"
# PR when unmerged changesets land on main; publishes to npm when that
# PR merges. The actual publish step is opt-in via the NPM_TOKEN
# secret — absent that secret, the workflow manages the version PR
# without shipping.

name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: release-${{ github.ref }}

jobs:
  release:
    name: Version + Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build publishable packages
        run: pnpm -r --filter "@stageflip/*" build

      - name: Changesets version or publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
