# services/blender-worker/pyproject.toml
# Tool config for the Python helper script that runs inside Blender.
# We do NOT distribute this as a Python package — `render.py` is invoked
# directly by `blender --python` — so this file only configures dev tooling
# (ruff for lint, pytest for the helper-function tests).

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "UP",  # pyupgrade
]

[tool.ruff.lint.per-file-ignores]
"render_test.py" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["scripts"]
python_files = ["render_test.py"]
addopts = "-ra"
