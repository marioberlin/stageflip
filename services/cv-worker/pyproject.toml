# services/cv-worker/pyproject.toml
# Tool config for the cv-worker Python service. We do NOT ship this as a
# packaged Python distribution — the service runs from app.py directly inside
# its container — so this file only configures dev tools (ruff, pytest).

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "UP",  # pyupgrade
]
ignore = [
  # Allow `Any` in pipeline wrapper return types — the upstream lib types
  # aren't stubbed.
  "ANN401",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"
filterwarnings = [
  "ignore::DeprecationWarning:paddle.*",
  "ignore::DeprecationWarning:paddleocr.*",
]
